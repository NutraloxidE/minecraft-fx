# ─────────────────────────────────────────────────────────────
#  GekiyabaFX — config.yml
#  このファイルを編集後、/fx reload または サーバー再起動で反映される。
# ─────────────────────────────────────────────────────────────

# ログインURLに使用するサーバーの公開IPアドレスまたはドメイン名。
# Docker・リバースプロキシ環境などでは自動取得が正しくない場合があるため、
# 必ずここに正しい値を設定すること。
server-ip: "127.0.0.1"

# 内蔵WebサーバーがリッスンするTCPポート番号。
# ファイアウォールでこのポートを開放すること。
web-port: 3010

# 開発モード。true にすると CORS で anyHost() を有効化する。
# 本番環境では必ず false にすること。
dev-mode: false

# OTPの有効期限（秒）。プレイヤー・管理者どちらにも共通で適用される。
otp-expire-seconds: 300

# セッショントークンの有効期限（秒）。
session-expire-seconds: 1800

# ─── ローソク足・履歴 ──────────────────────────────────────────
# executions の最大保持件数（ペアごと）。超過分は古い順に削除される。
executions-max-per-pair: 10000

# order_history の最大保持件数（ペアごと）。超過分は古い順に削除される。
order-history-max-per-pair: 500
