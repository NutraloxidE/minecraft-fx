# ─────────────────────────────────────────────────────────────
#  GekiyabaFX — config.yml
#  このファイルを編集後、/fx reload または サーバー再起動で反映される。
# ─────────────────────────────────────────────────────────────

# ログインURLに使用するサーバーの公開IPアドレスまたはドメイン名。
# Docker・リバースプロキシ環境などでは自動取得が正しくない場合があるため、
# 必ずここに正しい値を設定すること。
server-ip: "127.0.0.1"

# 内蔵Webサーバーが待受するIPアドレス。
# 本番では通常 0.0.0.0 のままにし、外部公開用の値は server-ip 側に設定する。
# 特定のNICだけで待受したい場合のみ変更すること。
web-bind-ip: "0.0.0.0"

# 内蔵WebサーバーがリッスンするTCPポート番号。
# ファイアウォールでこのポートを開放すること。
web-port: 3010

# 開発モード。true にすると CORS で anyHost() を有効化する。
# 本番環境では必ず false にすること。
dev-mode: false

# OTPの有効期限（秒）。プレイヤー・管理者どちらにも共通で適用される。
otp-expire-seconds: 300

# セッショントークンの有効期限（秒）。
session-expire-seconds: 1800

# ─── ローソク足・履歴 ──────────────────────────────────────────
# executions の最大保持件数（ペアごと）。超過分は古い順に削除される。
executions-max-per-pair: 10000

# order_history の最大保持件数（ペアごと）。超過分は古い順に削除される。
order-history-max-per-pair: 500

# ─── 手数料 ───────────────────────────────────────────────────────────
# Maker（板に残っていた注文）と Taker（新規注文）それぞれの手数料率。
# 約定時に買い手・売り手の両側から独立して徴収し、svc:treasury-fee へ振り込む。
fee:
  maker: "0.0010"   # 0.10%
  taker: "0.0012"   # 0.12%

# 通貨キーごとの手数料率オーバーライド。
# Minecraft に存在しないアイテム名（TempKey 等）を含むペアに個別レートを設定する。
# 登録がない通貨は fee.maker / fee.taker を使用する。
# 例:
#   feeOverrides:
#     tempkey: "0.0050"     # 0.50%（TempKey 系通貨）
#     specialcoin: "0.0000" # 手数料なし
feeOverrides: {}

# ─── Service アカウント ────────────────────────────────────────────
# /fx login-as <name> で使用できる Service アカウント名の許可リスト。
# ここに記載された名前のみログイン可能。内部IDは svc:<name> になる。
serviceAccounts:
  - treasury-fee
  - intervention-main
  - market-bot-1
  - arbitrage

# ─── ATM（取引ブロック定義）────────────────────────────────────────
# ブロックID（Material名）ごとに、グレード名・手数料率・配分率を定義する。
# キーは Minecraft の Material 名（大文字）を使用すること。
atm:
  block-grades:
    IRON_BLOCK:
      grade: "iron"
      maker: "0.0008"
      taker: "0.0012"
      owner-share: "0.65"
      treasury-share: "0.35"

    DIAMOND_BLOCK:
      grade: "diamond"
      maker: "0.0005"
      taker: "0.0008"
      owner-share: "0.25"
      treasury-share: "0.75"

    NETHERITE_BLOCK:
      grade: "netherite"
      maker: "0.0003"
      taker: "0.0005"
      owner-share: "0.10"
      treasury-share: "0.90"

  # ATM 構造判定: 看板中心の (2N+1)^3 範囲を走査する半径 N。
  block-scan-radius: 3

  # 上記範囲内で必要な同種ブロック数の最小値。
  required-matching-blocks: 11

  # [FX] 看板どうしの近接設置禁止半径（XYZ）。
  fx-sign-exclusion-radius: 3

# ─── 裁定取引（Arbitrage） ─────────────────────────────────────────────
arbitrage:
  enabled: false
  service_account: "svc:arbitrage"
  check_interval_ticks: 300

  min_gross_spread_pct: "0.5"
  min_net_profit_pct: "0.30"

  slip_detection:
    price_change_threshold_pct: "3.0"
    volume_drop_threshold_pct: "35"
    check_lookback_ticks: 60

  limit_price_tolerance_pct: "1.2"

  partial_fill_cancel_policy:
    spread_divergence_threshold_pct: "2.0"
    midprice_proximity_threshold_pct: "0.5"

  frame_distribution:
    enabled: true
    phase_count: 3

  log_file: "plugins/GekiyabaFX/logs/arbitrage.log"
  log_level: "INFO"
